name: Vehicular IDS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall src app utils tests main.py

      - name: Run test suite
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run CLI pipeline smoke test
        run: python main.py --alerts-output reports/ci_alerts.csv
